<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="merit_launchers">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>merit_launchers</title>
  <link rel="manifest" href="manifest.json">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'none'
      },
      startup: {
        typeset: false
      }
    };

    window.meritMath = {
      texToSvg: async function (tex, display) {
        await window.MathJax.startup.promise;
        const node = await window.MathJax.tex2svgPromise(tex, { display: display });
        const svg = node.querySelector('svg');
        if (!svg) {
          throw new Error('SVG output missing');
        }
        svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        svg.setAttribute('preserveAspectRatio', 'xMinYMid meet');
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.removeAttribute('style');
        svg.removeAttribute('focusable');
        svg.removeAttribute('role');
        svg.removeAttribute('aria-hidden');
        svg.querySelectorAll('[data-mml-node]').forEach((element) => {
          element.removeAttribute('data-mml-node');
        });
        svg.querySelectorAll('[style]').forEach((element) => {
          element.removeAttribute('style');
        });

        return svg.outerHTML
          .replace(/>\s+</g, '><')
          .replace(/\s{2,}/g, ' ')
          .trim();
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
