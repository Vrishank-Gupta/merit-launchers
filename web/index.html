  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f4f8fd 0%, #e8f1fb 100%);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    #ml-startup-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 9999;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    #ml-startup-shell.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .ml-startup-card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 28px rgba(15, 42, 74, 0.08);
      text-align: center;
    }

    .ml-startup-badge {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, #1f4d8c 0%, #27b1e6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 34px;
      font-weight: 700;
    }

    .ml-startup-title {
      margin: 0;
      color: #183b6b;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .ml-startup-copy {
      margin: 10px 0 0;
      color: #5d7090;
      font-size: 18px;
      line-height: 1.5;
    }

    .ml-startup-spinner {
      width: 34px;
      height: 34px;
      margin: 22px auto 0;
      border-radius: 50%;
      border: 3px solid rgba(39, 177, 230, 0.2);
      border-top-color: #27b1e6;
      animation: ml-spin 0.9s linear infinite;
    }

    @keyframes ml-spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    window.meritMath = (function () {
      let loadPromise = null;

      function buildMathJaxConfig() {
        return {
          tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']]
          },
          svg: {
            fontCache: 'none'
          },
          startup: {
            typeset: false
          }
        };
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          const existing = document.querySelector('script[data-ml-src="' + src + '"]');
          if (existing) {
            if (existing.dataset.loaded === 'true') {
              resolve();
              return;
            }
            existing.addEventListener('load', function () { resolve(); }, { once: true });
            existing.addEventListener('error', function () { reject(new Error('Failed to load ' + src)); }, { once: true });
            return;
          }

          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.dataset.mlSrc = src;
          script.addEventListener('load', function () {
            script.dataset.loaded = 'true';
            resolve();
          }, { once: true });
          script.addEventListener('error', function () {
            reject(new Error('Failed to load ' + src));
          }, { once: true });
          document.head.appendChild(script);
        });
      }

      async function ensureLoaded() {
        if (loadPromise) {
          return loadPromise;
        }
        loadPromise = (async function () {
          // Isolate MathJax v3 so it doesn't conflict with flutter_tex (MathJax v2).
          if (!window.meritMathJax) {
            const previousMathJax = window.MathJax;
            window.MathJax = buildMathJaxConfig();
            await loadScript('https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js');
            if (window.MathJax && window.MathJax.startup && window.MathJax.startup.promise) {
              await window.MathJax.startup.promise;
            }
            window.meritMathJax = window.MathJax;
            window.MathJax = previousMathJax;
          }
        })();
        return loadPromise;
      }

      async function texToSvg(tex, display) {
        await ensureLoaded();
        const mj = window.meritMathJax || window.MathJax;
        if (!mj) {
          throw new Error('MathJax not initialized');
        }
        let node = null;
        if (typeof mj.tex2svgPromise === 'function') {
          node = await mj.tex2svgPromise(tex, { display: display });
        } else if (typeof mj.tex2svg === 'function') {
          node = mj.tex2svg(tex, { display: display });
        } else {
          throw new Error('MathJax tex2svg API not available');
        }
        const svg = node.querySelector('svg');
        if (!svg) {
          throw new Error('SVG output missing');
        }
        svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        svg.setAttribute('preserveAspectRatio', 'xMinYMid meet');
        svg.removeAttribute('style');
        svg.removeAttribute('focusable');
        svg.removeAttribute('role');
        svg.removeAttribute('aria-hidden');
        svg.querySelectorAll('[data-mml-node]').forEach(function (element) {
          element.removeAttribute('data-mml-node');
        });
        svg.querySelectorAll('[style]').forEach(function (element) {
          element.removeAttribute('style');
        });

        return svg.outerHTML
          .replace(/>\s+</g, '><')
          .replace(/\s{2,}/g, ' ')
          .trim();
      }

      return {
        ensureLoaded: ensureLoaded,
        texToSvg: texToSvg,
      };
    })();

    window.meritMathLive = (function () {
      let loadPromise = null;

      function ensureStyle(href) {
        if (document.querySelector('link[data-ml-style="' + href + '"]')) {
          return;
        }
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        link.dataset.mlStyle = href;
        document.head.appendChild(link);
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          const existing = document.querySelector('script[data-ml-src="' + src + '"]');
          if (existing) {
            if (existing.dataset.loaded === 'true') {
              resolve();
              return;
            }
            existing.addEventListener('load', function () { resolve(); }, { once: true });
            existing.addEventListener('error', function () { reject(new Error('Failed to load ' + src)); }, { once: true });
            return;
          }

          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.dataset.mlSrc = src;
          script.addEventListener('load', function () {
            script.dataset.loaded = 'true';
            resolve();
          }, { once: true });
          script.addEventListener('error', function () {
            reject(new Error('Failed to load ' + src));
          }, { once: true });
          document.head.appendChild(script);
        });
      }

      async function ensureLoaded() {
        if (loadPromise) {
          return loadPromise;
        }
        loadPromise = (async function () {
          ensureStyle('https://unpkg.com/mathlive/static.css');
          await loadScript('https://unpkg.com/mathlive');
          if (!window.MathfieldElement) {
            throw new Error('MathLive failed to initialize');
          }
        })();
        return loadPromise;
      }

      return {
        ensureLoaded: ensureLoaded,
      };
    })();
  </script>
</head>
<body>
  <div id="ml-startup-shell">
    <div class="ml-startup-card">
      <div class="ml-startup-badge">M</div>
      <h1 class="ml-startup-title">Merit Launchers</h1>
      <p class="ml-startup-copy">Loading your workspace, courses, and latest access.</p>
      <div class="ml-startup-spinner"></div>
    </div>
  </div>
  <script>
    (function () {
      if (!('serviceWorker' in navigator) || !('caches' in window)) {
        return;
      }
      window.addEventListener('load', function () {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            registration.unregister().catch(function () {});
          });
        }).catch(function () {});
        caches.keys().then(function (keys) {
          keys
            .filter(function (key) { return key.indexOf('flutter-') === 0; })
            .forEach(function (key) { caches.delete(key).catch(function () {}); });
        }).catch(function () {});
      });
    })();

    window.addEventListener('flutter-first-frame', function () {
      var shell = document.getElementById('ml-startup-shell');
      if (shell) shell.classList.add('hidden');
    });
  </script>
  <script src="flutter_bootstrap.js" defer></script>
</body>
