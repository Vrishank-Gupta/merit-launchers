services:
  postgres:
    image: postgres:16-alpine
    container_name: merit-launchers-postgres
    restart: unless-stopped
    env_file:
      - ./server.env
    environment:
      POSTGRES_DB: merit_launchers
      POSTGRES_USER: merit
      POSTGRES_PASSWORD: strong_password
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
      - ./server/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merit -d merit_launchers"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./server
    container_name: merit-launchers-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server.env
    ports:
      - "8080:8080"
    volumes:
      - ./server/import-logs:/app/import-logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: merit-launchers-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/admin-web:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-backup:
    image: postgres:16-alpine
    container_name: merit-launchers-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server.env
    volumes:
      - ./docker/backups:/backups
      - ./docker/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup-postgres.sh"]
