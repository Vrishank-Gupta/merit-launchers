services:
  postgres:
    image: postgres:16-alpine
    container_name: merit-launchers-postgres
    restart: unless-stopped
    env_file:
      - ./server.env
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
      - ./server/sql:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: ./server
    container_name: merit-launchers-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./server.env
    ports:
      - "8080:8080"
    volumes:
      - ./server/import-logs:/app/import-logs

  nginx:
    image: nginx:1.27-alpine
    container_name: merit-launchers-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/admin-web:/usr/share/nginx/html:ro
