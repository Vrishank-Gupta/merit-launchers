server {
  listen 80;
  server_name meritlaunchers.com www.meritlaunchers.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name meritlaunchers.com www.meritlaunchers.com;

  ssl_certificate     /etc/letsencrypt/live/meritlaunchers.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/meritlaunchers.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  client_max_body_size 512m;
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  location /api/ {
    proxy_pass http://api:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /v1/admin/paper-sources {
    proxy_pass http://api:8080/v1/admin/paper-sources;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /v1/ {
    proxy_pass http://api:8080/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ref/ {
    proxy_pass http://api:8080/v1/referral/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ^~ /toolkit-files/ {
    alias /usr/share/nginx/toolkit-files/;
    add_header Cache-Control "public, max-age=86400";
  }

  location /health {
    proxy_pass http://api:8080/health;
  }

  location = /portal {
    return 302 /portal/;
  }

  location = /admin {
    return 302 /admin/;
  }

  location = /marketing {
    return 302 /marketing/;
  }

  location /portal/ {
    root /usr/share/nginx/html;
    index index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri /portal/index.html;
  }

  location /admin/ {
    root /usr/share/nginx/html;
    index index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri /admin/index.html;
  }

  location /marketing/ {
    root /usr/share/nginx/html;
    index index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri /marketing/index.html;
  }

  # index.html must never be cached — JS/CSS filenames are content-hashed
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location ^~ /uploads/ {
    rewrite ^/uploads/(.*)$ /toolkit-files/uploads/$1 permanent;
  }

  # Flutter entry-point files are NOT content-hashed — never cache them
  location ~* /(main\.dart\.js|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri =404;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    root /usr/share/nginx/html;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
