server {
  listen 80;
  server_name meritlaunchers.com www.meritlaunchers.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name meritlaunchers.com www.meritlaunchers.com;

  ssl_certificate     /etc/letsencrypt/live/meritlaunchers.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/meritlaunchers.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  client_max_body_size 512m;
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  location /api/ {
    proxy_pass http://api:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ref/ {
    proxy_pass http://api:8080/v1/referral/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /toolkit-files/ {
    alias /usr/share/nginx/toolkit-files/;
    add_header Cache-Control "public, max-age=86400";
  }

  location /health {
    proxy_pass http://api:8080/health;
  }

  location = /portal {
    return 302 /portal/;
  }

  location = /portal/ {
    rewrite ^ /portal/index.html last;
  }

  location = /admin {
    return 302 /admin/;
  }

  location = /admin/ {
    rewrite ^ /admin/index.html last;
  }

  location = /marketing {
    return 302 /marketing/;
  }

  location = /marketing/ {
    rewrite ^ /marketing/index.html last;
  }

  location /portal/ {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /portal/index.html;
  }

  location /admin/ {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /admin/index.html;
  }

  location /marketing/ {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /marketing/index.html;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri $uri/ /index.html;
  }

  location /uploads/ {
    alias /usr/share/nginx/blog-images/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    root /usr/share/nginx/html;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
