  <body>
    <div id="root"></div>
    <script>
      (function () {
        const likelyActionNodes = () => {
          const elements = Array.from(document.querySelectorAll('a, button, [role="button"]'));
          return elements.filter((element) => {
            const text = (element.textContent || '').trim();
            if (!text) return false;
            return text === 'Download App' || text === 'Get Started';
          });
        };

        const mountStudentLogin = () => {
          const actionNodes = likelyActionNodes();
          const getStarted = actionNodes.find((node) => (node.textContent || '').includes('Get Started'));
          if (!getStarted) {
            return;
          }

          if (getStarted.dataset.mlStudentLoginReady === 'true') {
            return;
          }

          getStarted.dataset.mlStudentLoginReady = 'true';
          getStarted.setAttribute('aria-label', 'Student Login');
          if (getStarted.tagName.toLowerCase() === 'a') {
            getStarted.setAttribute('href', '/portal/');
          } else {
            getStarted.addEventListener('click', () => {
              window.location.href = '/portal/';
            });
          }
          getStarted.textContent = 'Student Login';
        };

        const warmPortal = () => {
          if (window.__mlPortalWarm) {
            return;
          }
          window.__mlPortalWarm = true;

          const assets = [
            '/portal/',
            '/portal/flutter_bootstrap.js',
            '/portal/main.dart.js',
            '/portal/assets/AssetManifest.bin.json',
            '/portal/assets/FontManifest.json'
          ];

          assets.forEach((href) => {
            const link = document.createElement('link');
            link.rel = href.endsWith('.js') ? 'preload' : 'prefetch';
            link.href = href;
            if (href.endsWith('.js')) {
              link.as = 'script';
            } else if (href.endsWith('.json')) {
              link.as = 'fetch';
              link.crossOrigin = 'anonymous';
            } else {
              link.as = 'document';
            }
            document.head.appendChild(link);
          });
        };

        const observer = new MutationObserver(() => mountStudentLogin());
        observer.observe(document.documentElement, { childList: true, subtree: true });

        window.addEventListener('load', () => {
          mountStudentLogin();
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(warmPortal, { timeout: 2500 });
          } else {
            setTimeout(warmPortal, 1200);
          }
          setTimeout(mountStudentLogin, 500);
          setTimeout(mountStudentLogin, 1500);
        });
      })();
    </script>
